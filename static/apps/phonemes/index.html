<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonèmes</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf8;
      font-family: 'OpenDyslexic', system-ui, sans-serif;
      gap: 1.5rem;
      padding: 1rem;
    }

    #emoji {
      font-size: 7rem;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    #buttons {
      display: flex;
      gap: 2rem;
    }

    button {
      font-family: inherit;
      font-size: 1.2rem;
      padding: 0.5rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      transition: background 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }
    button:hover { background: #2563eb; }
    button:disabled { cursor: default; }

    #listen { background: #6b7280; }
    #listen:hover { background: #4b5563; }

    .phoneme {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      min-width: 8rem;
      padding: 1rem 1.25rem;
      background: #fff;
      color: #1f2937;
      border: 3px solid #d1d5db;
      border-radius: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .phoneme:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; }
    .phoneme .ipa    { font-size: 3rem; font-weight: 700; line-height: 1; font-style: italic; }
    .phoneme .letter { font-size: 0.95rem; color: #9ca3af; font-weight: 400; }

    .phoneme.correct {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #15803d;
    }
    .phoneme.wrong {
      border-color: #ef4444;
      background: #fef2f2;
      color: #dc2626;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    #reveal {
      min-height: 4.5rem;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.2;
    }
    #reveal mark {
      background: transparent;
      color: #1d4ed8;
    }

    #hint {
      min-height: 1.5rem;
      font-size: 1.05rem;
      color: #6b7280;
      text-align: center;
      font-style: italic;
    }

    #score {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.2rem;
      color: #6b7280;
    }

    .title {
      background: linear-gradient(90deg, #3b82f6, #22c55e, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #progress {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      max-width: min(90vw, 40rem);
    }

    .dot {
      width: 0.75rem;
      height: 0.75rem;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.correct { background: #22c55e; }
    .dot.wrong   { background: #ef4444; }
    .dot.current { background: #3b82f6; transform: scale(1.3); }
    .dot.current.wrong   { background: #ef4444; }
    .dot.current.correct { background: #22c55e; }
  </style>
</head>
<body>
  <div id="emoji"><span class="title">Phonèmes</span></div>

  <button id="listen" style="display:none">Écouter</button>

  <div id="buttons">
    <button id="voiced"   class="phoneme" style="display:none"></button>
    <button id="unvoiced" class="phoneme" style="display:none"></button>
  </div>

  <div id="reveal"></div>
  <div id="hint"></div>

  <button id="next" style="visibility:hidden">Suivant</button>
  <button id="start">Commencer</button>

  <div id="score"></div>
  <div id="progress"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
