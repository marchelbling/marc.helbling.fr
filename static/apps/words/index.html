<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orthographe</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf8;
      font-family: 'OpenDyslexic', system-ui, sans-serif;
      gap: 2rem;
    }

    #word {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.4;
      padding: 0 1rem;
    }

    #answer {
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      background: transparent;
      border: none;
      border-bottom: 4px solid #333;
      outline: none;
      text-align: center;
      color: #1d4ed8;
      padding: 0 0.1em;
      transition: border-color 0.15s;
      vertical-align: baseline;
    }

    #answer.correct {
      border-color: #22c55e;
      color: #15803d;
    }

    #answer.wrong {
      border-color: #ef4444;
      color: #dc2626;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    button {
      font-size: 1.2rem;
      padding: 0.5rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      transition: background 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }

    button:hover { background: #2563eb; }

    #listen { background: #6b7280; }
    #listen:hover { background: #4b5563; }

    #score {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.2rem;
      color: #6b7280;
    }

    .title {
      background: linear-gradient(90deg, #3b82f6, #22c55e, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #progress {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      max-width: min(90vw, 40rem);
    }

    .dot {
      width: 0.75rem;
      height: 0.75rem;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.correct { background: #22c55e; }
    .dot.wrong   { background: #ef4444; }
    .dot.current { background: #3b82f6; transform: scale(1.3); }
    .dot.current.wrong { background: #ef4444; }

    #tts-status {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div id="word"><span class="title">Orthographe</span></div>

  <div id="controls">
    <button id="start">Commencer</button>
    <button id="listen" style="display:none">Écouter</button>
    <button id="submit" style="display:none">Valider</button>
  </div>

  <div id="score"></div>
  <div id="progress"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
